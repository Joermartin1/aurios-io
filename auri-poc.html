<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auri · AuriOS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0D1F5C;
    --gold:  #F5A623;
    --steel: #4F78B8;
    --mist:  #D6E4F0;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--mist);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  #stage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #F5A623 0%, #4F78B8 45%, #0D1F5C 100%);
    margin-bottom: 40px;
  }

  #orb.speaking {
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(245,166,35,0.6); }
    60%  { box-shadow: 0 0 0 30px rgba(245,166,35,0.0); }
    100% { box-shadow: 0 0 0 0   rgba(245,166,35,0.0); }
  }

  #wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 6vw, 3.4rem);
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #tagline {
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 52px;
  }

  #words {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2.6vw, 1.4rem);
    font-weight: 300;
    line-height: 1.75;
    color: var(--mist);
    text-align: center;
    width: min(560px, 86vw);
    min-height: 3em;
    opacity: 0;
    transition: opacity 0.7s;
  }

  #words.show { opacity: 1; }

  #tap {
    margin-top: 44px;
    font-size: 0.68rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(79,120,184,0.5);
    cursor: pointer;
    transition: color 0.2s;
    border: none;
    background: none;
    outline: none;
  }

  #tap:hover { color: var(--gold); }
  #tap.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="stage">
  <div id="orb"></div>
  <div id="wordmark">Auri</div>
  <div id="tagline">The Intelligence Superhighway</div>
  <div id="words"></div>
  <button id="tap">Tap to hear again</button>
</div>

<script>
const GREETING = "Greetings, fellow traveler. Welcome to AuriOS. I'm Auri, your tour guide.";

const orb   = document.getElementById('orb');
const words = document.getElementById('words');
const tap   = document.getElementById('tap');

tap.classList.add('hidden');

function speak(text) {
  if (!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 0.82;
  utt.pitch = 1.0;

  try {
    const voices = window.speechSynthesis.getVoices();
    const preferred = ['Google UK English Male', 'Daniel', 'Alex'];
    for (const name of preferred) {
      const v = voices.find(v => v.name === name);
      if (v) { utt.voice = v; break; }
    }
  } catch(_) {}

  words.textContent = text;
  words.classList.add('show');
  orb.classList.add('speaking');
  tap.classList.add('hidden');

  utt.onend = utt.onerror = () => {
    orb.classList.remove('speaking');
    tap.classList.remove('hidden');
  };

  try {
    window.speechSynthesis.speak(utt);
  } catch(_) {
    orb.classList.remove('speaking');
    tap.classList.remove('hidden');
  }
}

tap.addEventListener('click', () => speak(GREETING));

// Auto-speak on load — voices need a moment on some browsers
function go() {
  words.textContent = GREETING;
  words.classList.add('show');
  speak(GREETING);
}

if ('speechSynthesis' in window) {
  if (window.speechSynthesis.getVoices().length > 0) {
    go();
  } else {
    window.speechSynthesis.onvoiceschanged = go;
    setTimeout(go, 600);
  }
} else {
  words.textContent = GREETING;
  words.classList.add('show');
  tap.classList.remove('hidden');
}
</script>
</body>
</html>
