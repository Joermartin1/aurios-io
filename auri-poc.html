<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auri · AuriOS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0D1F5C;
    --gold:  #F5A623;
    --steel: #4F78B8;
    --mist:  #D6E4F0;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--mist);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s;
  }
  .screen.active { opacity: 1; pointer-events: auto; }

  .orb {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #F5A623 0%, #4F78B8 45%, #0D1F5C 100%);
    margin-bottom: 36px;
    flex-shrink: 0;
  }
  .orb.speaking  { animation: pulse-speak 1.4s ease-in-out infinite; }
  .orb.listening { box-shadow: 0 0 0 16px rgba(245,166,35,0.15), 0 0 0 32px rgba(245,166,35,0.05); }

  @keyframes pulse-speak {
    0%   { box-shadow: 0 0 0 0   rgba(245,166,35,0.6); }
    60%  { box-shadow: 0 0 0 30px rgba(245,166,35,0.0); }
    100% { box-shadow: 0 0 0 0   rgba(245,166,35,0.0); }
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--steel);
  }

  /* Bell */
  #bell-btn {
    margin-top: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: none;
    border: none;
    cursor: pointer;
    outline: none;
    padding: 0;
  }
  #bell-icon {
    width: 48px;
    height: 48px;
    opacity: 0.45;
    transition: opacity 0.2s, transform 0.15s;
    animation: breathe 3s ease-in-out infinite;
  }
  #bell-btn:hover #bell-icon, #bell-btn:active #bell-icon {
    opacity: 1; animation: none; transform: rotate(-12deg);
  }
  #bell-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,166,35,0.45);
    transition: color 0.2s;
  }
  #bell-btn:hover #bell-label { color: var(--gold); }

  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: rotate(0deg); }
    50%       { opacity: 0.65; transform: rotate(6deg); }
  }

  /* Tour screen */
  #words {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 2.8vw, 1.35rem);
    font-weight: 300;
    line-height: 1.8;
    color: var(--mist);
    text-align: center;
    width: min(580px, 90vw);
    min-height: 3.6em;
    margin-top: 36px;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #words.show { opacity: 1; }

  #status {
    font-size: 0.67rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(79,120,184,0.5);
    min-height: 1.2em;
    margin-bottom: 22px;
    transition: color 0.3s;
  }
  #status.active { color: var(--gold); }

  #mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(245,166,35,0.3);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s, border-color 0.2s, background 0.2s;
  }
  #mic-btn.visible { opacity: 1; pointer-events: auto; }
  #mic-btn:hover   { border-color: var(--gold); background: rgba(245,166,35,0.07); }
  #mic-btn.active  { border-color: var(--gold); background: rgba(245,166,35,0.14); }
  #mic-btn svg { width: 20px; height: 20px; fill: var(--mist); transition: fill 0.2s; }
  #mic-btn.active svg, #mic-btn:hover svg { fill: var(--gold); }

  #text-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: min(380px, 88vw);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #text-row.visible { opacity: 1; pointer-events: auto; }

  #text-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(79,120,184,0.3);
    border-radius: 3px;
    color: var(--mist);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 9px 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #text-input:focus { border-color: var(--gold); }
  #text-input::placeholder { color: rgba(214,228,240,0.25); }

  #send-btn {
    background: transparent;
    border: 1px solid rgba(245,166,35,0.35);
    border-radius: 3px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send-btn:hover { background: rgba(245,166,35,0.1); }
</style>
</head>
<body>

<!-- SCREEN 1: Entry -->
<div id="screen-entry" class="screen active">
  <div class="orb"></div>
  <div class="wordmark">Auri</div>
  <div class="tagline">The Intelligence Superhighway</div>
  <button id="bell-btn">
    <svg id="bell-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2a7 7 0 0 0-7 7v4.17l-1.71 1.71A1 1 0 0 0 4 17h16a1 1 0 0 0 .71-1.71L19 13.17V9a7 7 0 0 0-7-7z" fill="#F5A623"/>
      <path d="M10 19a2 2 0 0 0 4 0" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="bell-label">Ring bell for Auri</span>
  </button>
</div>

<!-- SCREEN 2: Auri -->
<div id="screen-tour" class="screen">
  <div class="orb" id="orb"></div>
  <div class="wordmark">Auri</div>
  <div class="tagline">The Intelligence Superhighway</div>
  <div id="words"></div>
  <div id="status"></div>
  <button id="mic-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.364 9.364a.75.75 0 0 1 .75.75A7.114 7.114 0 0 1 12.75 18.2V21h2.25a.75.75 0 0 1 0 1.5h-6a.75.75 0 0 1 0-1.5H11.25v-2.8A7.114 7.114 0 0 1 4.886 11.114a.75.75 0 0 1 1.5 0A5.614 5.614 0 0 0 12 16.728a5.614 5.614 0 0 0 5.614-5.614.75.75 0 0 1 .75-.75z"/>
    </svg>
  </button>
  <div id="firefox-notice" style="display:none;margin-top:10px;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(79,120,184,0.5);">For voice, use Chrome</div>
  <div id="text-row">
    <input id="text-input" type="text" placeholder="Tell Auri…" autocomplete="off"/>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
// Kill Web Speech API globally — ElevenLabs is the only voice
if ('speechSynthesis' in window) {
  window.speechSynthesis.cancel();
  // Override speak to prevent any accidental Web Speech calls
  const _origSpeak = window.speechSynthesis.speak.bind(window.speechSynthesis);
  window.speechSynthesis.speak = function() {
    console.warn('Web Speech blocked — ElevenLabs only');
  };
}

// ── CONFIG ───────────────────────────────────────────────
const WORKER_URL    = 'https://aurios-auth.joe-a3a.workers.dev';
const GREETING      = "Welcome, fellow traveler. I'm Aww-ree. How can I assist you today? You can always ask for a guided tour.";

// ── STATE ────────────────────────────────────────────────
const history = [];
const orb       = document.getElementById('orb');
const words     = document.getElementById('words');
const statusEl  = document.getElementById('status');
const micBtn    = document.getElementById('mic-btn');
const textInput = document.getElementById('text-input');
const sendBtn   = document.getElementById('send-btn');
const textRow   = document.getElementById('text-row');

let recognition = null;
let isListening = false;
let audioCtx    = null;

// ── HELPERS ──────────────────────────────────────────────
function setStatus(msg, active) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('active', !!active);
}

function showWords(text) {
  words.classList.remove('show');
  setTimeout(() => { words.textContent = text; words.classList.add('show'); }, 150);
}

// ── ELEVENLABS TTS ───────────────────────────────────────
async function speakElevenLabs(text, onDone) {
  showWords(text);
  orb.classList.add('speaking');
  setStatus('Speaking…', true);

  try {
    const res = await fetch(`${WORKER_URL}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    const arrayBuffer = await res.arrayBuffer();
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    const source  = audioCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(audioCtx.destination);
    source.onended = () => {
      orb.classList.remove('speaking');
      if (onDone) onDone();
    };
    source.start(0);

  } catch (err) {
    console.warn('TTS failed, falling back to Web Speech', err);
    speakFallback(text, onDone);
  }
}

function speakFallback(text, onDone) {
  // NO Web Speech — ElevenLabs only
  orb.classList.remove('speaking');
  setStatus('', false);
  if (onDone) onDone();
}

function speak(text, onDone) {
  speakElevenLabs(text, onDone);
}

// ── GPT-4o VIA WORKER ────────────────────────────────────
async function askAuri(userText) {
  history.push({ role: 'user', content: userText });
  setStatus('Thinking…', true);
  micBtn.disabled = true;
  sendBtn.disabled = true;

  try {
    const res = await fetch(`${WORKER_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    const reply = data.reply || "I'm here. Tell me more.";
    history.push({ role: 'assistant', content: reply });

    speak(reply, () => {
      micBtn.disabled = false;
      sendBtn.disabled = false;
      readyToListen();
    });

  } catch (err) {
    const fallback = "Something interrupted us. I'm still here — speak again.";
    speak(fallback, () => {
      micBtn.disabled = false;
      sendBtn.disabled = false;
      readyToListen();
    });
  }
}

// ── STT ──────────────────────────────────────────────────
function setupRecognition() {
  const isFirefox = navigator.userAgent.toLowerCase().includes('firefox');
  if (isFirefox) {
    const notice = document.getElementById('firefox-notice');
    if (notice) notice.style.display = 'block';
    return false;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const said = e.results[0][0].transcript;
    stopListening();
    showWords('"' + said + '"');
    setStatus('');
    askAuri(said);
  };
  recognition.onerror = recognition.onend = () => { if (isListening) stopListening(); };
  return true;
}

function startListening() {
  if (!recognition) return;
  isListening = true;
  orb.classList.add('listening'); orb.classList.remove('speaking');
  micBtn.classList.add('active');
  setStatus('Listening…', true);
  try { recognition.start(); } catch(_) {}
}

function stopListening() {
  isListening = false;
  orb.classList.remove('listening'); micBtn.classList.remove('active');
  try { recognition.stop(); } catch(_) {}
}

function readyToListen() {
  micBtn.classList.add('visible');
  textRow.classList.add('visible');
  setStatus('Tap to speak', false);
}

// ── INPUT ────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (isListening) { stopListening(); setStatus('Tap to speak', false); return; }
  startListening();
});

sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });

function sendText() {
  const val = textInput.value.trim();
  if (!val) return;
  textInput.value = '';
  showWords('"' + val + '"');
  setStatus('');
  askAuri(val);
}

// ── BELL ─────────────────────────────────────────────────
document.getElementById('bell-btn').addEventListener('click', () => {
  // Kill any Web Speech that may be running
  if ('speechSynthesis' in window) { try { window.speechSynthesis.cancel(); } catch(_) {} }
  // Initialize AudioContext on user gesture (required by browsers)
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  document.getElementById('screen-entry').classList.remove('active');
  document.getElementById('screen-tour').classList.add('active');

  const hasSTT = setupRecognition();
  history.push({ role: 'assistant', content: GREETING });

  speak(GREETING, () => {
    if (hasSTT) { startListening(); }
    else        { readyToListen(); }
    textRow.classList.add('visible');
  });
});
</script>
</body>
</html>
