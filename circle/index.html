<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founding Circle · AuriOS™</title>
  <meta http-equiv="refresh" content="3;url=https://aurios.io" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1F5C;
      --gold: #F5A623;
      --warmwhite: #FAFAF7;
      --midgray: #6B7280;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--warmwhite);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .inner { max-width: 480px; padding: 40px; }
    .logo-mark {
      width: 52px; height: 52px; margin: 0 auto 32px; display: block;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: 2.2rem; color: var(--warmwhite);
      line-height: 1.2; margin-bottom: 16px;
    }
    p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.7; margin-bottom: 32px;
      letter-spacing: 0.04em;
    }
    .gold { color: var(--gold); }
    a {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--navy); background: var(--gold);
      text-decoration: none; padding: 12px 28px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="inner">
    <svg class="logo-mark" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="26" fill="#D6E4F0" opacity="0.2"/>
      <circle cx="28" cy="28" r="19" fill="#4F78B8" opacity="0.4"/>
      <circle cx="28" cy="28" r="12" fill="#0D1F5C"/>
      <circle cx="28" cy="28" r="5" fill="#F5A623"/>
    </svg>
    <h1>The Founding<br><span class="gold">Circle</span></h1>
    <p>
      This is a private, invitation-only space.<br>
      If you have a direct link, use it.<br>
      Redirecting to AuriOS.IO in a moment.
    </p>
    <a href="https://aurios.io">Return to AuriOS.IO →</a>
  </div>
</body>
</html>
